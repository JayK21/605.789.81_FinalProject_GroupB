spring.jpa.hibernate.ddl-auto=update
# URL and DB name to access mySQL server
spring.datasource.url=jdbc:mysql://localhost:3306/event_service
# username/password for accessing mySQL server
spring.datasource.username=root
spring.datasource.password=mysql
# CORS configuration to allow requests from any origin and specific HTTP methods and headers 
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allowed-headers=*